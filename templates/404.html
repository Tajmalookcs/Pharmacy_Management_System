<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — PharmaPOS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background:#f0f4f8; font-family:'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .error-card { background:#fff; border-radius:18px; padding:52px 48px; max-width:480px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.08); text-align:center; }
  .error-icon { font-size:64px; color:#0ea5e9; margin-bottom:16px; }
  .error-code { font-size:80px; font-weight:800; line-height:1; color:#e2e8f0; letter-spacing:-4px; }
  .error-title { font-size:22px; font-weight:700; color:#1e293b; margin-top:8px; }
  .error-msg { color:#64748b; margin:12px 0 28px; font-size:14px; }
  .btn-home { background:linear-gradient(135deg,#0ea5e9,#6366f1); color:#fff; border:none; border-radius:10px; padding:10px 28px; font-size:14px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
  .btn-home:hover { color:#fff; opacity:0.92; }
  .path-hint { font-size:11px; color:#94a3b8; margin-top:20px; font-family:monospace; word-break:break-all; }
</style>
</head>
<body>
<div class="error-card">
  <div class="error-icon"><i class="bi bi-search"></i></div>
  <div class="error-code">404</div>
  <div class="error-title">Page Not Found</div>
  <p class="error-msg">The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn-home"><i class="bi bi-house-fill"></i> Go to Dashboard</a>
  {% if path %}<p class="path-hint">{{ path }}</p>{% endif %}
</div>
</body>
</html>
