<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaPOS — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ── Animated background blobs ── */
        .blob-wrap {
            position: fixed;
            inset: 0;
            z-index: 0;
            filter: blur(0px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: drift linear infinite;
            opacity: 0.55;
        }

        .blob-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, #00c6ff, #0072ff);
            top: -120px; left: -100px;
            animation-duration: 18s;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #a855f7, #6366f1);
            bottom: -80px; right: -80px;
            animation-duration: 22s;
            animation-delay: -6s;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #06b6d4, #3b82f6);
            top: 40%; left: 55%;
            animation-duration: 16s;
            animation-delay: -3s;
        }
        .blob-4 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, #f472b6, #ec4899);
            top: 60%; left: 10%;
            animation-duration: 20s;
            animation-delay: -10s;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0)    scale(1);    }
            25%  { transform: translate(40px, -30px) scale(1.08); }
            50%  { transform: translate(80px, 40px)  scale(0.95); }
            75%  { transform: translate(-30px, 60px) scale(1.05); }
            100% { transform: translate(0, 0)    scale(1);    }
        }

        /* ── Liquid SVG filter ── */
        .liquid-filter { position: fixed; width: 0; height: 0; }

        .blob-wrap {
            filter: url(#liquid) blur(1px);
        }

        /* ── Floating particles ── */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* ── Login card ── */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 430px;
            padding: 16px;
            animation: card-in 0.8s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 44px 40px;
            box-shadow:
                0 32px 64px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* ── Logo / brand ── */
        .brand-icon {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #00c6ff, #6366f1);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            color: #fff;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(99,102,241,0.5);
            animation: pulse-icon 3s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { box-shadow: 0 8px 32px rgba(99,102,241,0.5); }
            50%       { box-shadow: 0 8px 48px rgba(0,198,255,0.8); }
        }

        .brand-title {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            color: #fff;
            letter-spacing: 1px;
        }

        .brand-sub {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            margin-top: 4px;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        /* ── Form fields ── */
        .field-wrap {
            position: relative;
            margin-bottom: 20px;
        }

        .field-wrap .field-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 17px;
            transition: color 0.3s;
            z-index: 2;
        }

        .field-wrap:focus-within .field-icon {
            color: #00c6ff;
        }

        .form-control-glass {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 14px 16px 14px 46px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
        }

        .form-control-glass::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .form-control-glass:focus {
            border-color: rgba(0,198,255,0.6);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(0,198,255,0.15);
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            font-size: 17px;
            transition: color 0.3s;
            background: none;
            border: none;
            z-index: 2;
        }

        .toggle-pw:hover { color: #00c6ff; }

        /* ── Alert ── */
        .alert-glass {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 13px;
            padding: 10px 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }

        /* ── Button ── */
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00c6ff 0%, #6366f1 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(99,102,241,0.4);
            margin-top: 8px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-login:hover::before { opacity: 1; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.55); }
        .btn-login:active { transform: translateY(0); }

        /* ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.25);
            font-size: 12px;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<!-- Liquid SVG filter -->
<svg class="liquid-filter" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="liquid">
            <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="3" seed="5" result="noise">
                <animate attributeName="baseFrequency"
                    values="0.012 0.012; 0.018 0.014; 0.012 0.012"
                    dur="12s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </defs>
</svg>

<!-- Animated blobs -->
<div class="blob-wrap">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
</div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Login card -->
<div class="login-wrap">
    <div class="card-glass">

        <!-- Brand -->
        <div class="brand-icon">
            <i class="bi bi-capsule-pill"></i>
        </div>
        <div class="brand-title">PharmaPOS</div>
        <div class="brand-sub">Pharmacy Point of Sale System</div>

        <!-- Error messages -->
        {% if messages %}
            {% for message in messages %}
            <div class="alert-glass">
                <i class="bi bi-exclamation-circle-fill"></i>
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <!-- Login form -->
        <form method="POST" action="{% url 'accounts:login' %}" id="loginForm">
            {% csrf_token %}

            <div class="field-wrap">
                <i class="bi bi-person field-icon"></i>
                <input
                    type="text"
                    name="username"
                    class="form-control-glass"
                    placeholder="Username"
                    autocomplete="username"
                    required
                    autofocus>
            </div>

            <div class="field-wrap">
                <i class="bi bi-lock field-icon"></i>
                <input
                    type="password"
                    name="password"
                    id="passwordField"
                    class="form-control-glass"
                    placeholder="Password"
                    autocomplete="current-password"
                    required>
                <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
                <span id="btnLoading" style="display:none;">
                    <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
                </span>
            </button>
        </form>

        <div class="login-footer">
            &copy; {% now "Y" %} PharmaPOS &mdash; All rights reserved
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* ── Particles ── */
    const container = document.getElementById('particles');
    for (let i = 0; i < 55; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
        p.style.animationDuration = (Math.random() * 12 + 8) + 's';
        p.style.animationDelay = (Math.random() * 15) + 's';
        p.style.opacity = Math.random() * 0.6 + 0.2;
        container.appendChild(p);
    }

    /* ── Toggle password ── */
    function togglePassword() {
        const field = document.getElementById('passwordField');
        const icon  = document.getElementById('eyeIcon');
        if (field.type === 'password') {
            field.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            field.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

    /* ── Ripple on login button ── */
    document.getElementById('loginBtn').addEventListener('click', function (e) {
        const btn = this;
        const ripple = document.createElement('span');
        const rect = btn.getBoundingClientRect();
        ripple.className = 'ripple';
        ripple.style.width = ripple.style.height = Math.max(rect.width, rect.height) + 'px';
        ripple.style.left = e.clientX - rect.left - ripple.offsetWidth / 2 + 'px';
        ripple.style.top  = e.clientY - rect.top  - ripple.offsetHeight / 2 + 'px';
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
    });

    /* ── Loading state on submit ── */
    document.getElementById('loginForm').addEventListener('submit', function () {
        document.getElementById('btnText').style.display    = 'none';
        document.getElementById('btnLoading').style.display = 'inline';
        document.getElementById('loginBtn').disabled = true;
    });
</script>
</body>
</html>
